<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 380px;">
        <h3 class="text-center mb-4">
            Cambiar contraseña
        </h3>

        <form (ngSubmit)="cambiarPassword()">
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuario:</label>
                <input type="text" class="form-control form-control-lg shadow-sm"
                    [(ngModel)]="dto.username" name="username" required
                    placeholder="Ingresa tu usuario">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña actual:</label>
                <input type="password" class="form-control form-control-lg shadow-sm"
                    [(ngModel)]="dto.passwordActual" name="passwordActual" required
                    placeholder="Ingresa tu contraseña actual">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Nueva contraseña:</label>
                <input type="password" class="form-control form-control-lg shadow-sm"
                    [(ngModel)]="dto.passwordNueva" name="passwordNueva" required
                    placeholder="Ingresa tu nueva contraseña">
            </div>

            <button type="submit" class="btn btn-dark w-100 mb-3">
                CAMBIAR CONTRASEÑA
            </button>

            <button type="button" class="btn btn-outline-secondary w-100"
                (click)="login()">
                LOGIN
            </button>
        </form>
    </div>
</div>
