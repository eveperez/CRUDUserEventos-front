<div class="container py-5">
    <div class="card shadow-lg border-0 rounded-3">
        <div class="card-header bg-light text-center py-4">
            <h2 class="fw-bold text-secondary m-0">EDICION DE EVENTOS</h2>
        </div>

        <div class="card-body p-4">
            <form>
                <div class="mb-3">
                    <label class="form-label fw-semibold">ID:</label>
                    <input type="number" class="form-control form-control-lg shadow-sm"
                        name="id" [(ngModel)]="eventoId" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">NOMBRE:</label>
                    <input type="text" class="form-control form-control-lg shadow-sm"
                        name="nombre" [(ngModel)]="evento.nombre">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">LUGAR:</label>
                    <input type="text" class="form-control form-control-lg shadow-sm"
                        name="lugar" [(ngModel)]="evento.lugar">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">FECHA:</label>
                    <input type="date" class="form-control form-control-lg shadow-sm"
                        name="fecha" [(ngModel)]="evento.fecha">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">PRECIO:</label>
                    <input type="number" class="form-control form-control-lg shadow-sm"
                        name="precio" [(ngModel)]="evento.precio">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">CAPACIDAD:</label>
                    <input type="number" class="form-control form-control-lg shadow-sm"
                        name="capacidad" [(ngModel)]="evento.capacidad">
                </div>

                <div class="d-flex justify-content-center gap-3">
                    <button type="button" class="btn btn-lg btn-outline-success shadow-sm px-4"
                        (click)="editar()">
                        <i class="bi bi-pencil-square me-2"></i> EDITAR
                    </button>
                    <button type="button" class="btn btn-lg btn-outline-danger shadow-sm px-4"
                        (click)="cancelar()">
                        <i class="bi bi-x-circle me-2"></i> CANCELAR
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
