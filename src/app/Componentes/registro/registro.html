<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 380px;">
        <h3 class="text-center mb-4">
            Registro
        </h3>

        <form (ngSubmit)="registrar()">
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuario:</label>
                <input type="text" class="form-control form-control-lg shadow-sm"
                    [(ngModel)]="usuario.username" name="username" required
                    placeholder="Ingresa tu usuario">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña:</label>
                <input type="password" class="form-control form-control-lg shadow-sm"
                    [(ngModel)]="usuario.password" name="password" required
                    placeholder="Ingresa tu contraseña">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Rol:</label>
                <select class="form-select form-select-lg shadow-sm"
                    [(ngModel)]="usuario.rol" name="rol">
                    <option value="ROLE_USER">USER</option>
                    <option value="ROLE_ADMIN">ADMIN</option>
                </select>
            </div>

            <button type="submit" class="btn btn-dark w-100 mb-3">
                REGISTRARSE
            </button>

            <button type="button" class="btn btn-outline-secondary w-100"
                (click)="login()">
                LOGIN
            </button>
        </form>
    </div>
</div>
