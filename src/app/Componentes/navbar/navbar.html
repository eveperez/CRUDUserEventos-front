<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">
        <i class="bi bi-calendar-event me-2"></i>Eventos
    </a>

    <div class="ms-auto d-flex gap-2">

        <!-- Siempre visible -->
        <button class="btn btn-outline-light" (click)="listarEventos()">
            <i class="bi bi-list-ul me-1"></i> LISTA
        </button>

        @if (isLoggedIn()) {

            <!-- Solo visible para USER -->
            @if (isUser()) {
            <button class="btn btn-outline-success" (click)="guardarEvento()">
                <i class="bi bi-plus-circle me-1"></i> GUARDAR EVENTO
            </button>
            }

            <button class="btn btn-outline-warning" (click)="logout()">
                <i class="bi bi-box-arrow-right me-1"></i> LOGOUT
            </button>

        } @else {

            <button class="btn btn-outline-light" (click)="login()">
                <i class="bi bi-box-arrow-in-right me-1"></i> LOGIN
            </button>

            <button class="btn btn-outline-light" (click)="registro()">
                <i class="bi bi-person-plus me-1"></i> REGISTRO
            </button>

            <button class="btn btn-outline-light" (click)="cambiarPassword()">
                <i class="bi bi-key me-1"></i> CAMBIAR PASSWORD
            </button>

        }

    </div>
</nav>
